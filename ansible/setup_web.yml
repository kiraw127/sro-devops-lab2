---
- name: Setup web stack
  hosts: web
  become: yes
  tasks:
    - name: Install nginx and php packages
      apt:
        update_cache: yes
        name:
          - nginx
          - php-fpm
          - php-cli
        state: present

    - name: Ensure nginx enabled and started
      service:
        name: nginx
        enabled: yes
        state: started
